name: Update jobs

on:
  schedule:
    # Fallback only — GitHub throttles free-tier cron to ~every 2-4h regardless
    # of what's written here. The real schedule is the Cloudflare Worker cron
    # (worker/wrangler.toml) firing workflow_dispatch every 15 min. Off-peak
    # minutes (7,37) dodge the worst scheduler congestion.
    - cron: "7,37 * * * *"
  workflow_dispatch:           # CF Worker cron + Scrape-now button land here
  push:
    branches: [main]
    paths: ["config/**", "scrape.py", "sources/**", "notify.py"]

permissions:
  contents: write

concurrency:
  group: update-jobs
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Scrape
        run: python scrape.py

      - name: Notify new jobs
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python notify.py

      - name: Commit refreshed data
        run: |
          git config user.name  "jobradar-bot"
          git config user.email "actions@github.com"
          git add docs/jobs.json docs/meta.json state/seen.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
