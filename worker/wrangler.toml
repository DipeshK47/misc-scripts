name = "jobradar-scrape"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Cloudflare cron drives the scrape schedule (GitHub's free-tier cron is
# throttled to ~every 2-4h; CF crons fire on time).
[triggers]
crons = ["*/15 * * * *"]

# Secret (do NOT put it here — set it with: wrangler secret put GH_TOKEN):
#   GH_TOKEN = a GitHub fine-grained token with "Actions: Read and write" on DipeshK47/jobradar
