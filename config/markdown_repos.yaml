# Curated repos that publish a markdown TABLE instead of listings.json.
# idx = 0-based column positions; date_kind = mon_dd | age | auto.
markdown_repos:
  - name: jobright-ai/2026-Software-Engineer-New-Grad
    url: https://raw.githubusercontent.com/jobright-ai/2026-Software-Engineer-New-Grad/master/README.md
    header: ["Company", "Job Title"]
    idx: {company: 0, role: 1, location: 2, apply: 1, date: 4}
    date_kind: mon_dd
    carry_forward: true
    default_role: new_grad
    hint: "software engineer"

