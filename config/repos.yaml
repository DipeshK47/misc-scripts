# Curated GitHub repos that publish a machine-readable listings.json.
# default_role just tags rows; the title still refines internship vs new_grad.
# All endpoints below were verified live. To add one: open the repo, confirm it
# has .github/scripts/listings.json on its default branch, and paste the raw URL.
repos:
  # ---- New-grad full-time ----
  # (dropped 2026-07-07: vanshb03/New-Grad-2027 stale since Apr 2026;
  #  cvrve/New-Grad-2025 is a rename-alias of the same repo = duplicate)
  - name: SimplifyJobs/New-Grad-Positions
    url: https://raw.githubusercontent.com/SimplifyJobs/New-Grad-Positions/dev/.github/scripts/listings.json
    default_role: new_grad

  # ---- Internships (Summer 2026 / 2027 + off-cycle) ----
  # (dropped 2026-07-07: both-sides/summer2026-internships dead since Jul 2025)
  - name: vanshb03/Summer2027-Internships
    url: https://raw.githubusercontent.com/vanshb03/Summer2027-Internships/dev/.github/scripts/listings.json
    default_role: internship
  - name: SimplifyJobs/Summer2026-Internships
    url: https://raw.githubusercontent.com/SimplifyJobs/Summer2026-Internships/dev/.github/scripts/listings.json
    default_role: internship
  - name: zshah101/2027-internships
    url: https://zshah101.github.io/Automated-List-Of-Summer-2027-and-Fall-2026-Tech-Internships/api/jobs.json
    schema: zshah
    default_role: internship
